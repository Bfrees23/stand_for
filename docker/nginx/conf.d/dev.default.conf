map $request_uri $loggable {
    "~^/\?debugbar"    0;
    "~^/__hot-reload"  0;
    "~^/.well-known/appspecific/com.chrome.devtools.json"  0;
    # Можно добавить и другие исключения
    # "~^/favicon\.ico"  0;

    default            1;
}

server {
    listen 80;
    root /var/www/public;
    index index.php;

    # Увеличенный лимит для загрузки файлов (удобно при тестировании)
    client_max_body_size 50M;

    # Подробное логирование для отладки
    error_log  /var/log/nginx/error.log error;
    access_log /var/log/nginx/access.log main if=$loggable;

    # Отключаем кэширование статики (чтобы изменения применялись сразу)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|ttf)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        access_log off;  # Отключаем логи для статики
    }

    # Блокировка небезопасных методов (оставляем для базовой защиты)
    if ($request_method !~ ^(GET|POST|HEAD)$) {
        return 405;
    }

    # Ослабляем блокировку символов (для удобства разработки)
    # if ($uri !~ "^[-a-zA-Z0-9@:%._\+~#=/?&]*$") {
    #     return 444;
    # }
    # if ($request_uri !~ "^[-a-zA-Z0-9@:%._\+~#=/?&]*$") {
    #     return 444;
    # }

    # Упрощаем обработку корневых запросов
    location / {
        try_files $uri $uri/ /index.html$is_args$args;
    }

    # Упрощаем обработку PHP (удаляем timeout для долгих скриптов)
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 600;  # Убираем таймаут для разработки
        fastcgi_buffering off;  # Отключаем буферизацию для мгновенного вывода
    }

    # Добавляем заголовки для разработки
    add_header X-Robots-Tag "noindex, nofollow" always;
}
