[global]
; глобальный уровень логов php-fpm
; log_level = warning
error_log = /proc/self/fd/2
;error_log = /var/www/logs/fpm-error.log

[www]
; отключаем access‑логи
; access.log = /proc/self/fd/2
access.log = /dev/null
catch_workers_output = yes

